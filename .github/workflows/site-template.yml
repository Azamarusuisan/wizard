name: site-template

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @craftsite/site-template
      - run: npx lhci autorun
        working-directory: apps/site-template
